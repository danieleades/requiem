on:
  push:
    branches: [main]
  pull_request:

name: Continuous integration

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: nightly
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - run: cargo test --all-features

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: actions-rs-plus/clippy-check@v2
        with:
          args: --all-features --all-targets

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack --no-dev-deps --rust-version check --all

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --all-features --doctests --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: lcov.info
          fail_ci_if_error: true

  example-mdbook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install mdBook
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.4.51  # todo: use a renovate matcher to keep this up to date

      - name: Install mdbook-yml-header
        uses: taiki-e/install-action@v2
        with:
          tool: mdbook-yml-header@0.1.4  # todo: use a renovate matcher to keep this up to date

      - name: Build mdBook example
        run: mdbook build
        working-directory: examples/mdbook

      - name: Build documentation book
        run: mdbook build
        working-directory: docs

  example-sphinx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Build Sphinx example
        run: uv run make SPHINXOPTS="-W --keep-going -n" html
        working-directory: examples/sphinx

  requirements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Check requirements health (suspect links and paths)
        run: cargo run --bin req -- -r docs/src/requirements status
      - name: Check mdBook navigation is up to date
        run: cargo run --bin req -- -r docs/src/requirements export summary --file docs/src/SUMMARY.md --check

  dependabot:
    needs:
      [
        test,
        format,
        lint,
        msrv,
        docs,
        cargo-deny,
        coverage,
        example-mdbook,
        example-sphinx,
        requirements,
      ]
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
